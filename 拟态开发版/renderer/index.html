<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>拟态 Nitai v2.0</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    overflow: hidden;
    background: transparent;
    user-select: none;
    position: relative;
  }

  canvas {
    display: block;
    image-rendering: crisp-edges;
    image-rendering: pixelated;
    background: transparent;
  }

  /* ── Speech bubble ─────────────────────────────────── */
  #bubble {
    position: absolute;
    left: 50%;
    background: rgba(255, 255, 255, 0.94);
    color: #333;
    font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
    border-radius: 14px;
    border: 1px solid #ccc;
    white-space: normal;
    word-wrap: break-word;
    pointer-events: none;
    box-shadow: 0 3px 12px rgba(0, 0, 0, 0.12),
                0 0 0 1px rgba(0, 0, 0, 0.03) inset;
    opacity: 0;
    transform: translateX(-50%) scale(0.8);
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 10;
  }

  #bubble.on {
    opacity: 1;
    transform: translateX(-50%) scale(1);
  }

  #bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 6px solid rgba(255, 255, 255, 0.94);
  }
</style>
</head>
<body>
<canvas id="pet-canvas" width="120" height="120"></canvas>
<div id="bubble"></div>

<!-- ═══════════════════════════════════════════════════════ -->
<!--  Nitai v2.0 — Modular loading (dependency order)       -->
<!-- ═══════════════════════════════════════════════════════ -->

<!-- 1. Global namespace + config -->
<script src="mimic.js"></script>

<!-- 2. Math / easing utilities -->
<script src="movement/easing.js"></script>

<!-- 3. Character rendering engine -->
<script src="character/expressions.js"></script>
<script src="character/animations.js"></script>
<script src="character/pixel-renderer.js"></script>

<!-- 4. Movement controller -->
<script src="movement/walk-controller.js"></script>

<!-- 5. Behavior system -->
<script src="behavior/state-machine.js"></script>
<script src="behavior/ai-controller.js"></script>

<!-- 6. Audio (Web Audio synthesis) -->
<script src="audio.js"></script>

<!-- 7. Particles -->
<script src="particles.js"></script>

<!-- 8. Speech bubble -->
<script src="bubble/bubble.js"></script>

<!-- 9. Interaction handlers -->
<script src="interaction/drag.js"></script>
<script src="interaction/click.js"></script>
<script src="interaction/contextmenu.js"></script>
<script src="interaction/drop.js"></script>
<script src="interaction/eye-tracking.js"></script>
<script src="interaction/chat.js"></script>
<script src="interaction/music-detect.js"></script>

<!-- 10. Bootstrap + game loop -->
<script src="app.js"></script>
</body>
</html>
